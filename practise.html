<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Document</title>
  </head>
  <body>
    <main class="w-100 mx-auto mt-10">
      <h1 class="text-xl font-semibold mb-2">Practice Calculator</h1>
      <p class="text-sm text-neutral-500 mb-5">Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
      <div>
        <h2 class="text-lg font-medium mb-2">Check Meta text word count for SEO</h2>
        <input type="text" name="" id="title" placeholder="Enter Meta Title" class="w-full border rounded-xl placeholder-text-neutral-500 p-2 mb-2" />
        <button onclick="seoTitle()" class="w-full px-3 py-2 bg-blue-500 text-white rounded-xl mb-2" id="btnTitle">Check Meta Title Count</button>
        <p id="titleResult" class="font-medium text-blue-500 mb-5"></p>

        <input type="text" onkeyup="countLetters()" id="desc" placeholder="Enter Meta Description" class="w-full border rounded-xl placeholder-text-neutral-500 p-2 mb-2" />
        <!-- <button onclick="seoDesc()" class="w-full px-3 py-2 bg-blue-500 text-white rounded-xl mb-3" id="btnDesc">Check Meta Description Count</button> -->
        <p id="descResult" class="font-medium text-blue-500"></p>
        <p id="descRange" class="font-medium"></p>
        <!-- <p></p> -->
      </div>
    </main>
    <script src="/app1.js"></script>
  </body>
</html>
